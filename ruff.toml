line-length = 100
target-version = "py311"

# Notebooks need matplotlib.use("Agg") before other imports; skip import-order linting there.
extend-exclude = ["notebooks", "*.ipynb"]

[lint]
select = ["E", "F", "I", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501"]  # line-length handled by formatter

[lint.isort]
known-first-party = ["probforecast"]

[format]
quote-style = "double"
indent-style = "space"
